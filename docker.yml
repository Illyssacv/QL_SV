# Chạy: docker compose -f docker.yml up -d db
# App (migration) trong container: docker compose -f docker.yml run --rm app

services:
  db:
    image: mysql:8.0
    container_name: school_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - school_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Trong mạng Docker dùng tên service, không dùng localhost
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    # Không cần env_file ở đây để tránh MYSQL_HOST=127.0.0.1 ghi đè

volumes:
  school_mysql_data:
